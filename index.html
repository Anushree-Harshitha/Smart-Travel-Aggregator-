<!DOCTYPE html>
<html>
<head>
<title>Smart Travel</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7;}

.header{text-align:center;padding:30px;font-size:32px;font-weight:bold;}

.container{display:flex;justify-content:center;gap:25px;flex-wrap:wrap;padding:40px;}

.card{background:white;width:260px;border-radius:15px;box-shadow:0 0 20px rgba(0,0,0,.2);text-align:center;overflow:hidden;transition:.3s;}
.card:hover{transform:scale(1.05);}

.card img{width:100%;height:170px;object-fit:cover;}

.card h3{margin:15px 0;}

.card button{
width:90%;
background:#2c7cff;
color:white;
border:none;
padding:12px;
margin-bottom:15px;
border-radius:8px;
cursor:pointer;
}

.footer{text-align:center;padding:20px;color:gray;}
</style>
</head>

<body>

<div class="header">
Smart Travel 🚍 🚆 🚗
<p style="font-size:16px;color:gray;">Plan your journey easily</p>
</div>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1544620347-c4fd4a3d5957">
<h3>Bus Travel</h3>
<button onclick="go('bus.html')">Explore Buses</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1504215680853-026ed2a45def">
<h3>Train Travel</h3>
<button onclick="go('train.html')">Explore Trains</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">
<h3>Taxi / Car</h3>
<button onclick="go('car.html')">Explore Taxis</button>
</div>

</div>

<div class="footer">
Smart Travel Aggregator Mini Project
</div>

<script>
function go(page){
window.location.href=page;
}
</script>

</body>
</html>
