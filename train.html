<!DOCTYPE html>
<html>
<head>
<title>My Trip – Train</title>
<style>
body{font-family:Arial;background:#eef2f7;display:flex;justify-content:center;}
.container{background:white;padding:25px;width:700px;border-radius:12px;box-shadow:0 0 20px rgba(0,0,0,.2);}
.card{border:2px solid #ddd;padding:10px;margin-top:10px;border-radius:6px;cursor:pointer;}
.selected{border-color:#2c7cff;background:#eef5ff;}
select,button{width:100%;padding:8px;margin:8px 0;}
button{background:#2c7cff;color:white;border:none;}
</style>
</head>

<body>
<div class="container">

<h2>Train Travel 🚆</h2>

<select id="from"><option>Bengaluru</option><option>Mysuru</option></select>
<select id="to"><option>Mysuru</option><option>Bengaluru</option></select>

<button onclick="search()">Search Trains</button>

<div id="routes"></div>

<iframe id="map" width="100%" height="250"></iframe>

<h3>Hotels</h3>
<div id="hotels"></div>

<h3>Summary</h3>
<div id="summary"></div>

<button onclick="confirmBooking()">Confirm</button>
<div id="confirm"></div>

</div>

<script>

let selectedTrain="", selectedHotel="";

function search(){

routes.innerHTML=`
<div class="card" onclick="pickTrain(this,'Express','₹350')">Express – 6AM – ₹350</div>
<div class="card" onclick="pickTrain(this,'Superfast','₹450')">Superfast – 7AM – ₹450</div>
<div class="card" onclick="pickTrain(this,'Vande Bharat','₹850')">Vande Bharat – ₹850</div>
`;

map.src="https://www.google.com/maps?q="+from.value+","+to.value+"&output=embed";

hotels.innerHTML=`
<div class="card" onclick="pickHotel('City View')">City View</div>
<div class="card" onclick="pickHotel('Budget Inn')">Budget Inn</div>
`;

summary.innerHTML="From: "+from.value+"<br>To: "+to.value;
}

function pickTrain(c,n,f){
document.querySelectorAll(".card").forEach(x=>x.classList.remove("selected"));
c.classList.add("selected");
selectedTrain=n+" "+f;
summary.innerHTML+="<br>Train: "+selectedTrain;
}

function pickHotel(h){
selectedHotel=h;
summary.innerHTML+="<br>Hotel: "+h;
}

function confirmBooking(){
confirm.innerHTML="Booked "+selectedTrain+" | "+selectedHotel;
}
</script>

</body>
</html>
